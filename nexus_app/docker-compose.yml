services:
  postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres_init:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='mkdir -p /var/lib/postgresql/data/pg_archive && cp %p /var/lib/postgresql/data/pg_archive/%f'
      -c max_wal_senders=3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - nexus_network

  neo4j:
    image: neo4j:5-community
    container_name: nexus-neo4j
    restart: always
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"
      - "${NEO4J_PORT}:7687"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - ./db/neo4j_init:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nexus_network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-fastapi
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      NEO4J_HOST: neo4j
      NEO4J_PORT: ${NEO4J_PORT}
      NEO4J_USER: ${NEO4J_USER}
      FASTAPI_HOST: ${FASTAPI_HOST}
      FASTAPI_PORT: ${FASTAPI_PORT}
      ENVIRONMENT: ${ENVIRONMENT}
      API_DB_USER: ${API_DB_USER}
      REDIS_HOST: redis
    # Contraseñas inyectadas como secrets (montadas en /run/secrets/<nombre>).
    # config.py las lee desde ahí en vez del .env.
    secrets:
      - api_db_password
      - neo4j_password
      - redis_password
      - clave_secreta_jwt
    ports:
      - "${FASTAPI_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi.rule=Host(`localhost`)"
      - "traefik.http.routers.fastapi.entrypoints=web"
      - "traefik.http.services.fastapi.loadbalancer.server.port=8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  traefik:
    image: traefik:v2.10
    container_name: nexus-traefik
    restart: always
    command:
      - "--api.insecure=true" # Solo para desarrollo, cambiar en producción
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80" # Única entrada expuesta
      - "8080:8080" # Dashboard de Traefik (solo desarrollo)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nexus_network
    depends_on:
      fastapi:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus_network
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

# Secrets: las contraseñas se leen desde archivos en ./secrets/ y se montan
# dentro del contenedor fastapi en /run/secrets/<nombre>.
# IMPORTANTE: los archivos ./secrets/*.txt NO deben subirse al repositorio.
secrets:
  api_db_password:
    file: ./secrets/api_db_password.txt
  neo4j_password:
    file: ./secrets/neo4j_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  clave_secreta_jwt:
    file: ./secrets/clave_secreta_jwt.txt

# Volúmenes persistentes para las bases de datos
volumes:
  postgres_data:
  neo4j_data:
  redis_data:

# Red interna para comunicación entre servicios
networks:
  nexus_network:
    driver: bridge